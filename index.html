<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaQuiz - Bilgi Yarışması</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-logo">
            <img src="img/ufo.png" alt="Logo"> <span>GalaQuiz</span>
        </div>

        <ul class="nav-links">
            <li><a href="#">Kategoriler</a></li>
            <li><a href="#">Nasıl Oynanır?</a></li>
            <li><a href="#">Puan Tablosu</a></li>
            <li><a href="#">Hakkımda</a></li>
        </ul>

        <div class="nav-auth">
            <a href="#" class="btn-login">Giriş Yap</a>
            <a href="#" class="btn-register">Kayıt Ol</a>
        </div>
    </nav>

    <img src="img/moon.svg" class="moon" alt="Ay">
    <div class="stars"></div>
    <img src="img/ufo.png" class="ufo" alt="UFO">

    <main class="welcome-section">
        <div class="welcome-card">
            <h1>GalaQuiz'e Hoş Geldin!</h1>
            <p>Evrenin en büyük bilgi yarışmasına katılmaya hazır mısın? Galaksiler arası rütbeni yükselt ve gerçek bir
                uzay gezgini olduğunu kanıtla.</p>

            <div class="welcome-stats">
                <div class="stat-item">
                    <span class="stat-value">500+</span>
                    <span class="stat-label">Soru</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">12</span>
                    <span class="stat-label">Kategori</span>
                </div>
            </div>
            <button class="cta-btn">Maceraya Başla</button>
        </div>
    </main>

    <div id="particle-container"></div>

    <script src="script.js"></script>
</body>

</html>
