<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgi Yarışması Oyunu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="stars"></div>
    <img src="https://cdni.iconscout.com/illustration/premium/thumb/ufo-flying-in-space-5054817-4206037.png" class="ufo"
        alt="UFO">
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ee/Weather_icon_-_full_moon.svg" class="moon" alt="Ay">
    <div id="particle-container"></div>
    <div class="container">
        <h1>Bilgi Yarışması</h1>

        <div id="question-container">
            <p id="question">Soru buraya gelecek...</p>
            <div id="answer-buttons" class="btn-grid">
            </div>
        </div>

        <div class="controls">
            <button id="start-btn" class="start-btn">Oyuna Başla</button>
            <button id="next-btn" class="next-btn hide">Sonraki Soru</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
